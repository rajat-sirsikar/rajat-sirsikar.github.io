---
layout: default
---

<div id="scrollProgress"></div>

<div class="flex min-h-screen">
  <!-- SIDEBAR -->
  <div class="sidebar hidden lg:flex flex-col">
    <div class="p-8 border-b border-white/10">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 bg-[#00ff9d] rounded-2xl flex items-center justify-center text-black font-bold text-3xl">R</div>
        <div>
          <h1 class="text-3xl tracking-tighter heading-font">Rajat Sirsikar</h1>
          <p class="text-[#00ff9d] text-sm">Computational Structural Engineer</p>
        </div>
      </div>
    </div>

    <nav class="flex-1 px-6 py-8">
      <ul class="space-y-2">
        <li><a href="#about" class="flex items-center gap-3 px-6 py-4 rounded-3xl hover:bg-white/5 sidebar-link">About</a></li>
        <li><a href="/news/" class="flex items-center gap-3 px-6 py-4 rounded-3xl hover:bg-white/5 sidebar-link">News</a></li>
        <li><a href="/blog/" class="flex items-center gap-3 px-6 py-4 rounded-3xl hover:bg-white/5 sidebar-link">Publications & Blog</a></li>
        <li><a href="/projects/" class="flex items-center gap-3 px-6 py-4 rounded-3xl hover:bg-white/5 sidebar-link">Projects</a></li>
        <li><a href="#contact" class="flex items-center gap-3 px-6 py-4 rounded-3xl hover:bg-white/5 sidebar-link">Contact</a></li>
      </ul>
    </nav>

    <div class="p-8 border-t border-white/10 text-sm text-white/60">
      © {{ 'now' | date: "%Y" }} Rajat Abhay Sirsikar
    </div>
  </div>

  <!-- MAIN CONTENT -->
  <div class="main-content flex-1">
    {{ content }}
  </div>
</div>

<script>
  // Scroll progress
  window.addEventListener('scroll', () => {
    const winScroll = document.body.scrollTop || document.documentElement.scrollTop;
    const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
    const scrolled = (winScroll / height) * 100;
    document.getElementById("scrollProgress").style.setProperty('--scroll', scrolled + "%");
  });
</script>
